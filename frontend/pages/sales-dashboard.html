<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Dashboard - CSRMS</title>
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
    <!-- Sales agent dashboard - POS, daily sales, receipts -->
    <div class="dashboard-container">
        <header class="header">
            <div class="logo">
                <img src="../images/logo.png" alt="Crown Stores Logo" class="header-logo">
                <span>Crown Stores CSRMS</span>
            </div>
            <div class="user-info">
                <span id="userName"></span>
                <div class="user-avatar" id="userAvatar" title="User Profile">U</div>
                <button id="logoutBtn" class="btn btn-logout">Logout</button>
            </div>
        </header>
        
        <nav class="sidebar">
            <ul>
                <li><a href="#" class="active" data-section="pos">Point of Sale</a></li>
                <li><a href="#" data-section="daily-sales">My Sales</a></li>
                <li><a href="#" data-section="receipts">Receipts</a></li>
                <li><a href="settings.html">Settings</a></li>
            </ul>
        </nav>
        
        <main class="main-content">
            <section id="pos" class="section active">
                <h2>Point of Sale</h2>
                <div class="pos-container">
                    <div class="search-section">
                        <input type="text" id="barcodeInput" placeholder="Scan barcode or enter product name">
                        <button class="btn btn-primary" id="searchProductBtn">Search</button>
                    </div>
                    
                    <div class="cart-section">
                        <h3>Shopping Cart</h3>
                        <table class="data-table" id="cartTable">
                            <thead>
                                <tr>
                                    <th>Product</th>
                                    <th>Qty</th>
                                    <th>Price</th>
                                    <th>Total</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                        <div class="cart-total">
                            <h3>Total: <span id="cartTotal">UGX 0</span></h3>
                            <button class="btn btn-success" id="checkoutBtn">Sell</button>
                        </div>
                    </div>
                </div>
            </section>
            
            <section id="daily-sales" class="section">
                <h2>My Daily Sales</h2>
                <table class="data-table" id="salesTable">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Product</th>
                            <th>Quantity</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </section>
            
            <section id="receipts" class="section">
                <h2>Receipts</h2>
                <table class="data-table" id="receiptsTable">
                    <thead>
                        <tr>
                            <th>Receipt #</th>
                            <th>Date</th>
                            <th>Amount</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </section>
        </main>
    </div>
    
    <script src="../js/dashboard.js"></script>
    <script src="../js/sales-dashboard.js"></script>
</body>
</html>
