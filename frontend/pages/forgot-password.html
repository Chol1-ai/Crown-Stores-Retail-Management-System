<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - CSRMS</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <!-- Forgot password form - request reset token -->
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <img src="../images/logo.png" alt="Crown Stores Logo" class="logo-img">
                <div class="logo-text">
                    <h1>Crown Stores</h1>
                    <p>Retail Management System</p>
                </div>
            </div>
            
            <form id="forgotForm" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="email">Registered Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <button type="submit" class="btn btn-primary">Get Reset Token</button>
            </form>
            
            <div id="resultMessage" class="error-message"></div>
            <p class="back-link">
                <a href="login.html">Back to Login</a>
            </p>
        </div>
    </div>
    <script src="../js/forgot-password.js"></script>
</body>
</html>
