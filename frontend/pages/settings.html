<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - CSRMS</title>
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
    <!-- Account settings page - change password -->
    <div class="dashboard-container">
        <header class="header">
            <div class="logo">
                <img src="../images/logo.png" alt="Crown Stores Logo" class="header-logo">
                <span>Crown Stores CSRMS</span>
            </div>
            <div class="user-info">
                <span id="userName"></span>
                <button id="logoutBtn" class="btn btn-logout">Logout</button>
            </div>
        </header>
        
        <nav class="sidebar">
            <ul>
                <li><a href="manager-dashboard.html">Dashboard</a></li>
                <li><a href="#" class="active">Settings</a></li>
            </ul>
        </nav>
        
        <!-- Password change form -->
        <main class="main-content">
            <section class="section active">
                <h2>Account Settings</h2>
                <div class="settings-container">
                    <!-- Change password section -->
                    <div class="settings-section">
                        <h3>Change Password</h3>
                        <form id="changePasswordForm" class="settings-form">
                            <div class="form-group">
                                <label for="currentPassword">Current Password</label>
                                <input type="password" id="currentPassword" name="currentPassword" required>
                            </div>
                            <div class="form-group">
                                <label for="newPassword">New Password</label>
                                <input type="password" id="newPassword" name="newPassword" required minlength="6">
                            </div>
                            <div class="form-group">
                                <label for="confirmPassword">Confirm New Password</label>
                                <input type="password" id="confirmPassword" name="confirmPassword" required minlength="6">
                            </div>
                            <button type="submit" class="btn btn-primary">Update Password</button>
                            <p id="passwordMessage" class="settings-message"></p>
                        </form>
                    </div>
                </div>
            </section>
        </main>
    </div>
    
    <script src="../js/dashboard.js"></script>
    <script src="../js/settings.js"></script>
</body>
</html>
