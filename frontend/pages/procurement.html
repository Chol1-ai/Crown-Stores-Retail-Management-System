<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procurement Management - CSRMS</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/procurement.css">
</head>
<body>
    <!-- Procurement management page -->
    <div class="dashboard-container">
        <header class="header">
            <div class="logo">
                <img src="../images/logo.png" alt="Crown Stores Logo" class="header-logo">
                <span>Crown Stores CSRMS</span>
            </div>
            <div class="user-info">
                <span id="userName"></span>
                <div class="user-avatar" id="userAvatar" title="User Profile">U</div>
                <button id="logoutBtn" class="btn btn-logout">Logout</button>
            </div>
        </header>
        
        <nav class="sidebar">
            <ul>
                <li><a href="manager-dashboard.html">Dashboard</a></li>
                <li><a href="#" class="active" data-section="procurement">Procurement</a></li>
            </ul>
        </nav>
        
        <main class="main-content">
            <section class="section active">
                <h2>Procurement Management</h2>
                <button class="btn btn-primary" id="addProcurementBtn">Record Procurement</button>
                <table class="data-table" id="procurementTable">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Product</th>
                            <th>Supplier</th>
                            <th>Quantity</th>
                            <th>Cost</th>
                        <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </section>
        </main>
    </div>
    
    <div id="procurementModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Record Procurement</h3>
            <form id="procurementForm">
                <div class="form-group">
                    <label>Product</label>
                    <select id="procurementProduct" required></select>
                </div>
                <div class="form-group">
                    <label>Supplier Name</label>
                    <input type="text" id="supplierName" required>
                </div>
                <div class="form-group">
                    <label>Quantity Received</label>
                    <input type="number" id="quantityReceived" required>
                </div>
                <div class="form-group">
                    <label>Cost Price</label>
                    <input type="number" id="procurementCostPrice" step="0.01" required>
                </div>
                <button type="submit" class="btn btn-primary">Save</button>
            </form>
        </div>
    </div>
    
    <script src="../js/dashboard.js"></script>
    <script src="../js/procurement.js"></script>
</body>
</html>
